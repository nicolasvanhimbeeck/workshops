<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FD Workshops — Overview</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --yellow:#EFAF39;--blue:#00B2DD;--teal:#0DBFA4;--orange:#F8763D;
  --dark:#413D3B;--mid:#978D87;--light:#C5BDB5;--bg:#F2F0EA;--white:#ffffff;
}
html,body{min-height:100%;background:#1a1917;font-family:'Inter',sans-serif;color:var(--white);}
body{display:flex;flex-direction:column;align-items:center;padding:64px 24px 80px;}
h1{font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:48px;}
.sessions{width:100%;max-width:640px;display:flex;flex-direction:column;gap:12px;}
.session{display:flex;align-items:center;gap:20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px 24px;text-decoration:none;color:inherit;transition:background .2s,border-color .2s;}
.session:hover{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.18);}
.date-badge{flex-shrink:0;background:var(--yellow);color:#1a1917;border-radius:8px;padding:8px 12px;text-align:center;min-width:52px;}
.date-badge .day{font-size:22px;font-weight:800;line-height:1;}
.date-badge .mon{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-top:2px;}
.info{display:flex;flex-direction:column;gap:4px;}
.info .name{font-size:16px;font-weight:600;}
.info .meta{font-size:12px;color:rgba(255,255,255,0.38);font-weight:400;}
.arrow{margin-left:auto;font-size:18px;color:rgba(255,255,255,0.25);flex-shrink:0;}
</style>
</head>
<body>
<h1>FD Workshops</h1>
<div class="sessions">

  <a class="session" href="20260625_FD_CC.html">
    <div class="date-badge"><div class="day">25</div><div class="mon">Jun</div></div>
    <div class="info">
      <span class="name">Knowledge Sharing — CC</span>
      <span class="meta">25 June 2026 · FD Workshop</span>
    </div>
    <span class="arrow">›</span>
  </a>

</div>
</body>
</html>
